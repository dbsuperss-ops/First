<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>이익률 순위 차트</title>
</head>
<body>
    <canvas id="canvas" width="1920" height="1080"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const data = [
            { name: 'KCTR', rate: 10.78, sales: 74249076468, profit: 8000378122 },
            { name: 'KSCCZ', rate: 5.91, sales: 75538696833, profit: 4466501643 },
            { name: 'KSCE', rate: -7.42, sales: 672678015658, profit: -49887720827 }
        ].sort((a, b) => b.rate - a.rate);

        ctx.fillStyle = '#000000';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('사업장별 이익률 순위 (2026년)', canvas.width / 2, 100);

        const chartX = 300;
        const chartY = 250;
        const barHeight = 120;
        const spacing = 80;
        const maxBarWidth = 1300;

        data.forEach((item, index) => {
            const y = chartY + index * (barHeight + spacing);

            const absMaxRate = 15;
            const barWidth = Math.abs(item.rate / absMaxRate) * maxBarWidth;
            const isNegative = item.rate < 0;

            const gradient = ctx.createLinearGradient(chartX, y, chartX + barWidth, y);
            if (isNegative) {
                gradient.addColorStop(0, '#DC2626');
                gradient.addColorStop(1, '#991B1B');
            } else if (item.rate >= 10) {
                gradient.addColorStop(0, '#10B981');
                gradient.addColorStop(1, '#059669');
            } else {
                gradient.addColorStop(0, '#F59E0B');
                gradient.addColorStop(1, '#D97706');
            }

            ctx.fillStyle = gradient;
            ctx.fillRect(chartX, y, barWidth, barHeight);

            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 3;
            ctx.strokeRect(chartX, y, barWidth, barHeight);

            ctx.fillStyle = '#000000';
            ctx.font = 'bold 40px Arial';
            ctx.textAlign = 'right';
            ctx.fillText(`${index + 1}. ${item.name}`, chartX - 30, y + 75);

            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 42px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`${item.rate.toFixed(2)}%`, chartX + 20, y + 75);

            ctx.fillStyle = '#000000';
            ctx.font = '24px Arial';
            ctx.textAlign = 'left';
            const salesLabel = `매출: ${Math.round(item.sales / 100000000)}억원`;
            const profitLabel = `영업이익: ${Math.round(item.profit / 100000000)}억원`;
            ctx.fillText(salesLabel, chartX + barWidth + 30, y + 45);
            ctx.fillText(profitLabel, chartX + barWidth + 30, y + 85);
        });

        ctx.strokeStyle = '#CCCCCC';
        ctx.lineWidth = 2;
        ctx.setLineDash([10, 5]);
        ctx.beginPath();
        ctx.moveTo(chartX, chartY - 50);
        ctx.lineTo(chartX, chartY + 3 * (barHeight + spacing) - spacing + 50);
        ctx.stroke();
        ctx.setLineDash([]);

        canvas.toBlob(function(blob) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'chart3_profit_rate_ranking.png';
            a.click();
        });
    </script>
</body>
</html>
