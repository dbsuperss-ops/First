<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>매출/이익/비용 통합 비교</title>
</head>
<body>
    <canvas id="canvas" width="1920" height="1080"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const data = [
            { name: 'KCTR', 매출: 74249076468, 영업이익: 8000378122, 비용: 66248698345 },
            { name: 'KSCCZ', 매출: 75538696833, 영업이익: 4466501643, 비용: 65633005417 },
            { name: 'KSCE', 매출: 672678015658, 영업이익: -49887720827, 비용: 667880535573 }
        ];

        ctx.fillStyle = '#000000';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('사업장별 매출/이익/비용 통합 비교 (2026년)', canvas.width / 2, 80);

        const chartX = 150;
        const chartY = 180;
        const chartWidth = 1620;
        const chartHeight = 750;
        const groupWidth = 450;
        const barWidth = 120;
        const spacing = 50;

        const maxValue = Math.max(...data.map(d => Math.max(d.매출, d.비용)));

        const colors = {
            매출: { start: '#10B981', end: '#059669' },
            영업이익: { start: '#3B82F6', end: '#2563EB' },
            비용: { start: '#EF4444', end: '#DC2626' }
        };

        data.forEach((item, index) => {
            const groupX = chartX + index * (groupWidth + spacing);

            [
                { key: '매출', value: item.매출, offset: 0 },
                { key: '영업이익', value: Math.abs(item.영업이익), offset: barWidth + 15 },
                { key: '비용', value: item.비용, offset: (barWidth + 15) * 2 }
            ].forEach(bar => {
                const barHeight = (bar.value / maxValue) * chartHeight;
                const x = groupX + bar.offset;
                const y = chartY + chartHeight - barHeight;

                const gradient = ctx.createLinearGradient(x, y, x, y + barHeight);
                gradient.addColorStop(0, colors[bar.key].start);
                gradient.addColorStop(1, colors[bar.key].end);
                ctx.fillStyle = gradient;
                ctx.fillRect(x, y, barWidth, barHeight);

                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, barWidth, barHeight);

                ctx.fillStyle = '#000000';
                ctx.font = 'bold 18px Arial';
                ctx.textAlign = 'center';
                const label = Math.round(bar.value / 100000000) + '억';
                ctx.fillText(label, x + barWidth / 2, y - 10);
            });

            ctx.fillStyle = '#000000';
            ctx.font = 'bold 32px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(item.name, groupX + groupWidth / 2, chartY + chartHeight + 50);
        });

        ctx.fillStyle = '#666666';
        ctx.font = '20px Arial';
        ctx.textAlign = 'right';
        for (let i = 0; i <= 5; i++) {
            const value = (maxValue / 5) * i;
            const y = chartY + chartHeight - (chartHeight / 5) * i;
            ctx.fillText(Math.round(value / 100000000) + '억', chartX - 20, y + 7);

            ctx.strokeStyle = '#E5E7EB';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(chartX, y);
            ctx.lineTo(chartX + chartWidth, y);
            ctx.stroke();
        }

        const legendY = chartY + chartHeight + 100;
        const legendItems = [
            { label: '매출', color: colors.매출.start },
            { label: '영업이익', color: colors.영업이익.start },
            { label: '비용', color: colors.비용.start }
        ];

        legendItems.forEach((item, i) => {
            const x = canvas.width / 2 - 250 + i * 200;
            ctx.fillStyle = item.color;
            ctx.fillRect(x, legendY, 40, 40);
            ctx.strokeStyle = '#000000';
            ctx.strokeRect(x, legendY, 40, 40);

            ctx.fillStyle = '#000000';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(item.label, x + 50, legendY + 28);
        });

        canvas.toBlob(function(blob) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'chart2_integrated_comparison.png';
            a.click();
        });
    </script>
</body>
</html>
